<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive examples of Worldality internationalization with Vanilla"
    />
    <meta name="theme-color" content="#ffffff" />
    <title>Worldality - Vanilla Example</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="preload"
      href="/fonts/inter-variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/inter-variable-italic.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/geist-mono-variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { useLocaleRouting } from "worldality";

      import { mountExampleApp } from "/src/app.ts";

      const root = document.querySelector("#app");
      const cleanupRouting = await useLocaleRouting();
      const cleanupExample =
        root instanceof HTMLElement
          ? mountExampleApp({ container: root, framework: "vanilla" })
          : () => {};

      window.addEventListener(
        "beforeunload",
        () => {
          cleanupRouting();
          cleanupExample();
        },
        { once: true },
      );
    </script>
  </body>
</html>
